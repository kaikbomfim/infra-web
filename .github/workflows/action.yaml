name: Deploy na AWS

on:
 push:
  branches: [main]

jobs:
 deploy:
  runs-on: ubuntu-latest
  steps:
   - name: Primeiro passo
     run: echo "O pipeline rodou!"

   - uses: actions/checkout@v4
   
   - name: Validar o site
     run: |
      test -f site/index.html
      grep -q "<h1>" site/index.html
      echo "site/index.html OK"
